<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Auto Training Queue</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <style id="admin-styles">
        body { margin: 0; padding: 0; display: flex; background: #f8fafc; }
        .admin-sidebar { width: 260px; height: 100vh; background: white; border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
        .admin-main { margin-left: 260px; width: calc(100% - 260px); min-height: 100vh; display: flex; flex-direction: column; }
        .admin-topbar { height: 70px; background: white; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; position: fixed; top: 0; left: 260px; right: 0; z-index: 500; box-sizing: border-box; }
        .sidebar-logo { padding: 1.5rem; display: flex; align-items: center; gap: 0.8rem; font-weight: bold; font-size: 1.2rem; color: var(--accent-forest); border-bottom: 1px solid var(--glass-border); }
        .sidebar-menu { padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; flex-grow: 1; }
        .sidebar-link { display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1rem; border-radius: 8px; color: var(--text-main); text-decoration: none; font-weight: 500; transition: all 0.3s; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(16, 185, 129, 0.1); color: var(--accent-forest); font-weight: 600; }
        .admin-content { padding: 2rem; width: 100%; box-sizing: border-box; margin-top: 70px; }
        .app-header { display: none !important; }
        
        .data-table-container {
            width: 100%;
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            margin-top: 1rem;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 800px;
        }
        .data-table th, .data-table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .data-table th {
            background: var(--accent-forest);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .data-table tr:last-child td {
            border-bottom: none;
        }
        .data-table tr:hover td {
            background: rgba(16, 185, 129, 0.05);
        }
        .count-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-forest);
            padding: 0.4rem 1rem;
            border-radius: 99px;
            font-weight: bold;
            font-size: 0.95rem;
            display: inline-block;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-title {
            font-size: 1.5rem;
            color: var(--text-main);
            font-weight: 700;
        }
        
        @media (max-width: 768px) {
            .admin-sidebar { display: none; }
            .admin-main { margin-left: 0; width: 100%; }
            .admin-topbar { padding: 0 1rem; }
            .admin-content { padding: 1rem; }
        }
    </style>
</head>
<body>
    {% include 'admin/admin_sidebar.html' %}
    <div class="admin-main">
        <div class="admin-topbar">
            <div></div> <!-- Left empty spacer -->
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span style="font-weight: 600; color: var(--text-main);">Admin</span>
                <div style="width: 35px; height: 35px; border-radius: 50%; background: var(--accent-forest); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; cursor: pointer;">A</div>
            </div>
        </div>
        <div class="admin-content">
            <div class="page-header">
                <h2 class="page-title">Auto Training Queue</h2>
                <button class="btn-submit" onclick="alert('Manual Retrain Triggered!')" style="padding: 0.6rem 1.5rem; font-size: 0.95rem;">
                    Force Retrain Now
                </button>
            </div>
            
            <div class="data-table-container">
                <table class="data-table" id="dataset-table">
                    <thead>
                        <tr>
                            <th>S.No</th>
                            <th>Model Name</th>
                            <th>Folder Name</th>
                            <th>Folder Class Name</th>
                            <th>Count</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Populated dynamically via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        const datasetTree = {{ dataset_tree | tojson }};
        const tableBody = document.getElementById('table-body');
        
        function formatName(str) {
            return str.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function populateTable() {
            tableBody.innerHTML = '';
            let rows = [];
            let sno = 1;
            
            Object.entries(datasetTree).forEach(([breed, categories]) => {
                Object.entries(categories).forEach(([cat, classes]) => {
                    Object.entries(classes).forEach(([cls, count]) => {
                        const limit = 100;
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${sno++}</td>
                            <td><strong>${formatName(breed)}</strong></td>
                            <td>${formatName(cat)}</td>
                            <td>${cls}</td>
                            <td>
                                <span class="count-badge">${count} / ${limit}</span>
                            </td>
                        `;
                        rows.push(tr);
                    });
                });
            });
            
            if (rows.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5"><div class="empty-state">No pending uploads found.</div></td></tr>`;
            } else {
                rows.forEach(r => tableBody.appendChild(r));
            }
        }
        
        populateTable();
    </script>
</body>
</html>
